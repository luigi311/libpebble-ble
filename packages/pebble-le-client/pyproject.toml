[project]
name = "pebble-le-client"
version = "0.1.0"
description = "Pythonic client for the pebble-led daemon — talk to your Pebble without touching D-Bus."
requires-python = ">=3.11"
dependencies = [
    "dbus-fast>=2.21",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pebble_le_client"]
