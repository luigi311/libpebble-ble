[project]
name = "cobble-client"
version = "0.5.0"
description = "Pythonic client for the cobbled daemon — talk to your Pebble without touching D-Bus."
requires-python = ">=3.11"
dependencies = [
    "dbus-fast>=2.21",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cobble_client"]
