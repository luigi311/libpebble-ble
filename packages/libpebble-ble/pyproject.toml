[project]
name = "libpebble-ble"
version = "0.1.0"
description = "Talk to a Pebble smartwatch over Bluetooth Low Energy from Linux."
requires-python = ">=3.11"
dependencies = [
    "bleak>=0.22",
    "dbus-fast>=2.21",
    "loguru>=0.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/libpebble_ble"]
