[project]
name = "pebble-le-proto"
version = "0.1.0"
description = "Shared D-Bus contract (interface names, paths, value codecs) for the pebble-le daemon and client."
requires-python = ">=3.11"
# Depends on libpebble-ble ONLY for the AppMessage value types (Int + width
# wrappers) so the codecs can reference them. No D-Bus runtime dependency here:
# this package defines the contract as constants + pure functions; dbus-fast
# lives in the daemon and client that actually open a bus.
dependencies = [
    "libpebble-ble",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pebble_le_proto"]
